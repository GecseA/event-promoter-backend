name: Deployment of Backend API

on:
  push:
    tags:
      - "release_v[0-9]+.[0-9]+.[0-9]+"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod
      tags:
        description: 'Tag message'
        required: false
        type: string

permissions:
  contents: write  # This gives permission to push tags

