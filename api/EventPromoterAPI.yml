openapi: 3.0.3
info:
  title: Template-Driven Events API
  version: 1.0.0
  description: >
    OpenAPI spec for a template-driven structure featuring authentication (login/signup),
    user levels (admin/vip/regular), event listing, event access, and event registration.
servers:
  - url: https://api.example.com
    description: Production
  - url: https://staging-api.example.com
    description: Staging

tags:
  - name: Auth
  - name: Events
  - name: Registrations

security:
  - bearerAuth: []

paths:
  /auth/signup:
    $ref: "./paths/Auth.yml#/~1auth~1signup"
  /auth/login:
    $ref: "./paths/Auth.yml#/~1auth~1login"

  /events:
    $ref: "./paths/Events.yml#/~1events"
  /events/{eventId}:
    $ref: "./paths/Events.yml#/~1events~1{eventId}"
  /events/{eventId}/access:
    $ref: "./paths/Events.yml#/~1events~1{eventId}~1access"
  /events/{eventId}/registrations:
    $ref: "./paths/Registrations.yml#/~1events~1{eventId}~1registrations"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    EventIdParam:
      name: eventId
      in: path
      required: true
      description: Event identifier.
      schema:
        type: string
        example: ["evt_123"]
    PageParam:
      name: page
      in: query
      required: false
      description: 1-based page number.
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: pageSize
      in: query
      required: false
      description: Number of items per page.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20

  schemas:
    UserLevel:
      $ref: "./components/schemas/AuthDtosSchemas.yml#/UserLevel"
    AccessLevel:
      $ref: "./components/schemas/AuthDtosSchemas.yml#/AccessLevel"
    User:
      $ref: "./components/schemas/AuthDtosSchemas.yml#/User"
    SignupRequest:
      $ref: "./components/schemas/AuthDtosSchemas.yml#/SignupRequest"
    LoginRequest:
      $ref: "./components/schemas/AuthDtosSchemas.yml#/LoginRequest"

    EventModel:
      $ref: "./components/schemas/EventDtosSchemas.yml#/EventModel"
    HeroModel:
      $ref: "./components/schemas/EventDtosSchemas.yml#/HeroModel"
    LocationModel:
      $ref: "./components/schemas/EventDtosSchemas.yml#/LocationModel"
    OrganizerModel:
      $ref: "./components/schemas/EventDtosSchemas.yml#/OrganizerModel"
    SessionModel:
      $ref: "./components/schemas/EventDtosSchemas.yml#/SessionModel"
    RegistrationModel:
      $ref: "./components/schemas/EventDtosSchemas.yml#/RegistrationModel"

    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        error:
          type: object
          additionalProperties: false
          properties:
            code:
              type: string
              example: ["VALIDATION_ERROR", "UNAUTHORIZED", "FORBIDDEN", "NOT_FOUND", "CONFLICT"]
            message:
              type: string
              example: ["Something went wrong."]
            details:
              type: string
              nullable: true
              description: Optional machine-readable details (e.g., field errors).
          required: [code, message, details]
      required: [error]

